openapi: 3.1.0
info:
  title: Metals Analytics Reference API
  description: Metals-API provides a free, simple, and lightweight JSON API for current and historical precious metals rates and currency conversion. It supports real-time and historical data for gold, silver, platinum, palladium, and other metals in 170 world currencies.
  version: '1.0'
  contact:
    name: Metals-API
    url: https://metals-api.com/
  license:
    name: Proprietary
    url: https://metals-api.com/terms
servers:
- url: https://metals-api.com/api
  description: Production
security:
- accessKey: []
tags:
- name: Reference
  description: Symbols and reference data.
paths:
  /symbols:
    get:
      summary: List supported symbols
      description: Returns all available currencies and metals supported by the API.
      operationId: getSymbols
      tags:
      - Reference
      responses:
        '200':
          description: A list of supported metals and currencies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymbolsResponse'
components:
  schemas:
    SymbolsResponse:
      type: object
      properties:
        success:
          type: boolean
        symbols:
          type: object
          additionalProperties:
            type: string
  securitySchemes:
    accessKey:
      type: apiKey
      in: query
      name: access_key
